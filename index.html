<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento Empresas Gestão Online</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:20px;
  background:#F5F5F0;
  color:#2b2b2b;
}

.container,
.box{
  background:#fff;
  border-radius:12px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
}

h1,h2,h3{
  color:#35451F;
  margin-top:0;
}

input,
select,
textarea{
  width:100%;
  padding:10px;
  border:1px solid #cfcfc7;
  border-radius:6px;
  font-size:14px;
}

button{
  background:#556B2F;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:10px 16px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#6B8E23;
}

button.excluir{
  background:#8B2D2D;
}

button.excluir:hover{
  background:#A13A3A;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-top:15px;
}

.card{
  background:#EEF4E4;
  border-left:5px solid #556B2F;
  border-radius:8px;
  padding:15px;
  min-width:220px;
}

.card h3{
  margin:0 0 8px 0;
  color:#35451F;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th{
  background:#556B2F;
  color:#fff;
  padding:10px;
  border:1px solid #d0d0d0;
}

td{
  padding:8px;
  border:1px solid #d0d0d0;
}

tr:nth-child(even){
  background:#f9f9f9;
}

.status-ativo{
  background:#DCE8CF;
  color:#2D4716;
  padding:4px 8px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.status-alerta{
  background:#FFF3B0;
  color:#7A6200;
  padding:4px 8px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.status-vencido{
  background:#FFB3B3;
  color:#8B0000;
  padding:4px 8px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.login-box{
  max-width:650px;
  margin:40px auto;
}

.login-box h2{
  color:#556B2F;
}

.topo{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.menu{
  background:#35451F;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

.menu button{
  margin-right:8px;
  margin-bottom:8px;
}

a{
  color:#556B2F;
  text-decoration:none;
  font-weight:bold;
}

a:hover{
  text-decoration:underline;
}

@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }

  .cards{
    flex-direction:column;
  }

  table{
    font-size:12px;
  }
}

.modal{display:none;position:fixed;z-index:999;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.45);padding:20px}
.modal-content{background:#fff;border-radius:12px;padding:20px;max-width:900px;margin:40px auto}
.small{font-size:12px;color:#666}
.barra{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:15px}
.msg{font-size:13px;color:#555}
.acoes button{margin:2px;padding:7px 10px}
</style>
</head>
<body>
<div id="loginBox" class="box login">
<h2>Login - Acompanhamento Empresas Gestão</h2>
<p>Digite o e-mail cadastrado na aba <b>Usuarios</b>.</p>
<div style="display:flex;gap:10px;flex-wrap:wrap"><input id="emailLogin" type="email" placeholder="seuemail@gmail.com" style="flex:1"><button onclick="fazerLogin()" style="flex:1">Entrar</button></div>
<p id="msgLogin" class="msg"></p>
</div>

<div id="appBox" style="display:none">
<div class="barra"><div><b>Usuário:</b> <span id="usuarioInfo"></span></div><div><button onclick="carregarDados()">Atualizar</button> <button onclick="sair()">Sair</button></div></div>
<div class="box">
<h2>ACOMPANHAMENTO EMPRESAS GESTÃO</h2>

<div class="grid">
<select id="responsavelSomesso">
<option value="">Selecione o responsável Somesso</option>
<option value="Tassio Borges">Tassio Borges</option>
<option value="Tamilla Pereira">Tamilla Pereira</option>
</select>
<input id="cnpj" placeholder="CNPJ">
<input id="empresa" placeholder="Empresa">
<input id="email" type="email" placeholder="E-mail">
<input id="telefone" placeholder="Telefone">
<input id="contato" placeholder="Contato">
<select id="palestras"><option value="">Palestras Anuais</option><option value="Sim">Sim</option><option value="Não">Não</option></select>
<select id="s2210"><option value="">Envio S-2210</option><option value="Sim">Sim</option><option value="Não">Não</option></select>
<select id="s2220"><option value="">Envio S-2220</option><option value="Sim">Sim</option><option value="Não">Não</option></select>
<select id="s2240"><option value="">Envio S-2240</option><option value="Sim">Sim</option><option value="Não">Não</option></select>
<select id="aso"><option value="">Informação ASO's a vencer</option><option value="Sim">Sim</option><option value="Não">Não</option></select>
<select id="renovacao"><option value="">Renovação Automática</option><option value="Sim">Sim</option><option value="Não">Não</option></select>
</div><br>
<div style="display:flex;gap:10px;flex-wrap:wrap;"><button id="btnAdicionar" type="button" onclick="adicionar()">Adicionar</button><button id="btnCancelar" type="button" onclick="cancelarEdicao()" style="display:none;background:#777">Cancelar edição</button><button type="button" onclick="exportarExcel()">Exportar Excel</button><button type="button" onclick="gerarPDF()">Gerar PDF</button></div>
<p id="msgSistema" class="msg"></p>
<div class="cards"><div class="card">Total de Empresas<br><span id="ct">0</span></div><div class="card">Palestras: Sim<br><span id="cp">0</span></div><div class="card">Renovação: Sim<br><span id="cr">0</span></div></div>
<div class="grid" style="margin-top:15px">
<input id="filtro" placeholder="Pesquisar...">
<select id="filtroResponsavel" onchange="render()">
<option value="">Todos os responsáveis</option>
<option value="Tassio Borges">Tassio Borges</option>
<option value="Tamilla Pereira">Tamilla Pereira</option>
</select>
</div>
<table id="tab"><thead><tr><th>Responsável Somesso</th><th>CNPJ</th><th>Empresa</th><th>E-mail</th><th>Telefone</th><th>Contato</th><th>Palestras</th><th>S-2210</th><th>S-2220</th><th>S-2240</th><th>ASO</th><th>Renovação</th><th>Ações</th></tr></thead><tbody id="tb"></tbody></table>
</div>
</div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyEcifHlp3y6VCMbp68PzRZi3dNt-Y1gtvdTJjJ5WLPwVWcvUaLE9ue_Xa0uBoIN_SKBw/exec';
const PORTAL_API_URL = 'https://script.google.com/macros/s/AKfycbyMSNie2VlxV25H-3MpvENoBZO6IdF1QByYSpWOl5yd0vAAKQhyXiMuJaqNo42Kc_nX/exec';
let itens = [];
let empresas = [];
let editandoId = null;
let usuarioLogado = null;

async function api(acao, dados={}){
  const resp = await fetch(API_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify({acao, ...dados})});
  const txt = await resp.text();
  try{return JSON.parse(txt)}catch(e){console.error(txt);throw new Error('Resposta inválida da API')}
}
async function fazerLogin(){
  const email = emailLogin.value.trim().toLowerCase();

  if(!email){
    alert('Digite seu e-mail.');
    return;
  }

  msgLogin.textContent='Verificando acesso...';

  try{
    const r = await api('login',{email});

    if(!r.ok){
      msgLogin.textContent = r.erro || 'Acesso negado';
      return;
    }

    usuarioLogado = r.usuario;

    localStorage.setItem('usuario_gestao_email', email);
    localStorage.setItem('usuario_somesso_email', email);

    localStorage.setItem(
      'usuario_gestao',
      JSON.stringify(r.usuario)
    );

    loginBox.style.display='none';
    appBox.style.display='block';

    usuarioInfo.textContent =
      `${usuarioLogado.nome} - ${usuarioLogado.perfil}`;

    aplicarPermissoesUsuario();
    await carregarDados();

  }catch(e){
    msgLogin.textContent =
      'Erro ao conectar com a API: ' + e.message;
  }
}
function sair(){['portal_usuario','portal_usuario_email','somesso_usuario','somesso_usuario_email','usuario_pcmso','usuario_pcmso_email','usuario_gestao','usuario_gestao_email','usuario_relatorio','usuario_relatorio_email','usuario_metas','usuario_metas_email'].forEach(k=>localStorage.removeItem(k));location.reload();}

function responsavelUsuario(){
  return usuarioLogado
    ? (usuarioLogado.consultorVinculado || usuarioLogado.vendedorVinculado || usuarioLogado.nome || '')
    : '';
}

function isAdm(){
  return String(usuarioLogado?.perfil || '').toUpperCase().trim() === 'ADM';
}

function aplicarPermissoesUsuario(){
  if(!usuarioLogado) return;

  if(!isAdm()){
    const resp = responsavelUsuario();
    responsavelSomesso.value = resp;
    responsavelSomesso.disabled = true;

    if(filtroResponsavel){
      filtroResponsavel.style.display = 'none';
      filtroResponsavel.value = '';
    }
  } else {
    responsavelSomesso.disabled = false;
    if(filtroResponsavel){
      filtroResponsavel.style.display = 'block';
    }
  }
}


async function apiPortal(acao,dados={}){
  const resp = await fetch(PORTAL_API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({acao,...dados})});
  const txt = await resp.text();
  try{return JSON.parse(txt)}catch(e){return {ok:false,empresas:[]}}
}
async function carregarEmpresasDoPortal(){
  try{
    const r = await apiPortal('listarEmpresas');
    if(r && (r.empresas || r.Empresas)) return r.empresas || r.Empresas || [];
  }catch(e){}
  try{return JSON.parse(localStorage.getItem('portal_empresas') || '[]')}catch(e){return []}
}

async function carregarDados(){
  msgSistema.textContent='Carregando dados...';
  try{
    const r = await api('listar');
    itens = (r.gestao || []).map(normalizarGestao);
    empresas = [...(r.empresas || []), ...(await carregarEmpresasDoPortal())].map(normalizarEmpresa);
    aplicarPermissoesUsuario();
    render(); msgSistema.textContent='Dados atualizados.';
  }catch(e){msgSistema.textContent='Erro ao carregar dados: '+e.message}
}
function normalizarGestao(x){
  return {id:x.ID||x.id||'',responsavelSomesso:x['Responsável Somesso']||x.responsavelSomesso||'',cnpj:x.CNPJ||x.cnpj||'',empresa:x.Empresa||x.empresa||'',contato:x.Contato||x.contato||'',email:x.Email||x['E-mail']||x.email||'',telefone:x.Telefone||x.telefone||'',palestras:x.Palestras||x.palestras||'',s2210:x['S-2210']||x.s2210||'',s2220:x['S-2220']||x.s2220||'',s2240:x['S-2240']||x.s2240||'',aso:x.ASO||x.aso||'',renovacao:x['Renovação']||x.renovacao||''}
}
function normalizarEmpresa(x){return {cnpj:x.CNPJ||x.cnpj||'',empresa:x.Empresa||x.empresa||'',contato:x.Contato||x.contato||'',email:x.Email||x['E-mail']||x.email||'',telefone:x.Telefone||x.telefone||''}}
function esc(v){return String(v??'').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function limparCNPJ(v){return String(v||'').replace(/\D/g,'')}
function itensVisiveis(){
  let lista = itens;

  if(usuarioLogado && !isAdm()){
    const meuNome = String(usuarioLogado.nome || '').toLowerCase().trim();
    const meuVinculo = String(responsavelUsuario()).toLowerCase().trim();

    lista = lista.filter(item=>{
      const resp = String(item.responsavelSomesso || '').toLowerCase().trim();
      return resp === meuNome || resp === meuVinculo;
    });
  }

  if(usuarioLogado && isAdm()){
    const filtroResp = String(filtroResponsavel?.value || '').toLowerCase().trim();

    if(filtroResp){
      lista = lista.filter(item =>
        String(item.responsavelSomesso || '').toLowerCase().trim() === filtroResp
      );
    }
  }

  const f = String(filtro?.value || '').toLowerCase().trim();

  if(f){
    lista = lista.filter(item => Object.values(item).join(' ').toLowerCase().includes(f));
  }

  return lista;
}

function render(){
  tb.innerHTML='';

  const visiveis = itensVisiveis();

  let palestrasSim=0, renovacaoSim=0;

  visiveis.forEach((item)=>{
    if(String(item.palestras).toLowerCase()==='sim') palestrasSim++;
    if(String(item.renovacao).toLowerCase()==='sim') renovacaoSim++;

    tb.innerHTML += `<tr><td>${esc(item.responsavelSomesso)}</td><td>${esc(item.cnpj)}</td><td>${esc(item.empresa)}</td><td>${esc(item.email)}</td><td>${esc(item.telefone)}</td><td>${esc(item.contato)}</td><td>${esc(item.palestras)}</td><td>${esc(item.s2210)}</td><td>${esc(item.s2220)}</td><td>${esc(item.s2240)}</td><td>${esc(item.aso)}</td><td>${esc(item.renovacao)}</td><td class="acoes"><button onclick="editarPorId('${item.id}')">Editar</button><button class="excluir" onclick="excluirItem('${item.id}')">Excluir</button></td></tr>`;
  });

  ct.innerText=visiveis.length;
  cp.innerText=palestrasSim;
  cr.innerText=renovacaoSim;
}
function limparCampos(){
  ['responsavelSomesso','cnpj','empresa','email','telefone','contato','palestras','s2210','s2220','s2240','aso','renovacao']
    .forEach(id=>document.getElementById(id).value='');

  aplicarPermissoesUsuario();
}
async function adicionar(){
  const responsavelFinal = isAdm()
    ? responsavelSomesso.value.trim()
    : responsavelUsuario();

  let obj={
    id:editandoId||'',
    responsavelSomesso:responsavelFinal,
    cnpj:cnpj.value.trim(),
    empresa:empresa.value.trim(),
    email:email.value.trim(),
    telefone:telefone.value.trim(),
    contato:contato.value.trim(),
    palestras:palestras.value,
    s2210:s2210.value,
    s2220:s2220.value,
    s2240:s2240.value,
    aso:aso.value,
    renovacao:renovacao.value
  };

  for(let k in obj){
    if(k!=='id' && !obj[k]){
      alert('Preencha todos os campos.');
      return;
    }
  }

  btnAdicionar.disabled=true;
  msgSistema.textContent='Salvando...';

  try{
    let r=await api('salvarGestao',obj);

    if(!r.ok){
      alert(r.erro||'Erro ao salvar.');
      return;
    }

    editandoId=null;
    btnAdicionar.innerText='Adicionar';
    btnCancelar.style.display='none';

    limparCampos();
    await carregarDados();

    alert('Registro salvo com sucesso!');
  }catch(e){
    alert('Erro ao salvar: '+e.message)
  } finally{
    btnAdicionar.disabled=false
  }
}

function editarPorId(id){
  let item=itens.find(x=>String(x.id)===String(id));
  if(!item) return;

  if(!isAdm()){
    const meuNome = String(usuarioLogado.nome || '').toLowerCase().trim();
    const meuVinculo = String(responsavelUsuario()).toLowerCase().trim();
    const resp = String(item.responsavelSomesso || '').toLowerCase().trim();

    if(resp !== meuNome && resp !== meuVinculo){
      alert('Você não tem permissão para editar este registro.');
      return;
    }
  }

  editandoId=item.id;
  responsavelSomesso.value=item.responsavelSomesso;
  cnpj.value=item.cnpj;
  empresa.value=item.empresa;
  email.value=item.email;
  telefone.value=item.telefone;
  palestras.value=item.palestras;
  s2210.value=item.s2210;
  s2220.value=item.s2220;
  s2240.value=item.s2240;
  aso.value=item.aso;
  renovacao.value=item.renovacao;
  aplicarPermissoesUsuario();
  btnAdicionar.innerText='Salvar Edição';
  btnCancelar.style.display='inline-block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function editar(index){const item = itens[index]; if(item) editarPorId(item.id)}
function cancelarEdicao(){editandoId=null; btnAdicionar.innerText='Adicionar'; btnCancelar.style.display='none'; limparCampos()}
async function excluirItem(id){
  let item=itens.find(x=>String(x.id)===String(id));

  if(!item){
    alert('Registro não encontrado.');
    return;
  }

  if(!isAdm()){
    const meuNome = String(usuarioLogado.nome || '').toLowerCase().trim();
    const meuVinculo = String(responsavelUsuario()).toLowerCase().trim();
    const resp = String(item.responsavelSomesso || '').toLowerCase().trim();

    if(resp !== meuNome && resp !== meuVinculo){
      alert('Você não tem permissão para excluir este registro.');
      return;
    }
  }

  if(!confirm('Deseja excluir este registro?'))return;

  msgSistema.textContent='Excluindo...';

  try{
    await api('excluirGestao',{id});
    await carregarDados();
  }catch(e){
    alert('Erro ao excluir: '+e.message)
  }
}
function abrirCadastroEmpresas(){modalEmpresas.style.display='block'} function fecharCadastroEmpresas(){modalEmpresas.style.display='none'}
async function salvarCadastroEmpresa(){let obj={cnpj:limparCNPJ(cadCnpj.value),empresa:cadEmpresa.value.trim(),email:cadEmail.value.trim(),telefone:cadTelefone.value.trim(),responsavelEmpresa:cadResponsavel.value.trim()}; if(obj.cnpj.length!==14){alert('CNPJ inválido');return} for(let k in obj){if(!obj[k]){alert('Preencha todos os campos da empresa.');return}} try{let r=await api('salvarEmpresa',obj); if(!r.ok){alert(r.erro||'Erro ao salvar empresa.');return} fecharCadastroEmpresas(); cadCnpj.value=cadEmpresa.value=cadEmail.value=cadTelefone.value=cadResponsavel.value=''; await carregarDados(); alert('Empresa cadastrada com sucesso!')}catch(e){alert('Erro ao salvar empresa: '+e.message)}}
function preencherEmpresaPorCNPJ(){let c=limparCNPJ(cnpj.value); let emp=empresas.find(e=>limparCNPJ(e.cnpj)===c); if(emp){empresa.value=emp.empresa||''; email.value=emp.email||''; telefone.value=emp.telefone||''; contato.value=emp.contato||'';}}
cnpj.addEventListener('input',preencherEmpresaPorCNPJ);
cnpj.addEventListener('change',preencherEmpresaPorCNPJ);
cnpj.addEventListener('blur',preencherEmpresaPorCNPJ);
filtro.addEventListener('keyup', render);
function exportarExcel(){let dados=itensVisiveis().map(item=>({'Responsável Somesso':item.responsavelSomesso,'CNPJ':item.cnpj,'Empresa':item.empresa,'E-mail':item.email,'Telefone':item.telefone,'Contato':item.contato,'Palestras':item.palestras,'S-2210':item.s2210,'S-2220':item.s2220,'S-2240':item.s2240,'ASO':item.aso,'Renovação':item.renovacao}));let ws=XLSX.utils.json_to_sheet(dados);let wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Gestão');XLSX.writeFile(wb,'acompanhamento_empresas.xlsx')}
function gerarPDF(){const {jsPDF}=window.jspdf;let doc=new jsPDF('landscape');doc.text('Acompanhamento Empresas Gestão',14,15);let rows=itensVisiveis().map(item=>[item.responsavelSomesso,item.cnpj,item.empresa,item.email,item.telefone,item.contato,item.palestras,item.s2210,item.s2220,item.s2240,item.aso,item.renovacao]);doc.autoTable({startY:25,head:[['Responsável','CNPJ','Empresa','Email','Telefone','Contato','Palestras','S-2210','S-2220','S-2240','ASO','Renovação']],body:rows,styles:{fontSize:7}});doc.save('acompanhamento_empresas.pdf')}
window.addEventListener('load', async () => {
  const params = new URLSearchParams(window.location.search);
  const email = params.get('email') || params.get('usuario') || localStorage.getItem('portal_usuario_email') || localStorage.getItem('usuario_gestao_email') || localStorage.getItem('usuario_somesso_email') || '';
  const usuarioPortal = localStorage.getItem('portal_usuario') || localStorage.getItem('usuario_gestao') || localStorage.getItem('usuario_somesso');
  if(usuarioPortal){
    try{usuarioLogado = JSON.parse(usuarioPortal);}catch(e){}
  }
  if(usuarioLogado){
    if(email){localStorage.setItem('usuario_gestao_email', email); localStorage.setItem('usuario_somesso_email', email); localStorage.setItem('portal_usuario_email', email);}
    localStorage.setItem('usuario_gestao', JSON.stringify(usuarioLogado));
    localStorage.setItem('usuario_somesso', JSON.stringify(usuarioLogado));
    localStorage.setItem('portal_usuario', JSON.stringify(usuarioLogado));
    loginBox.style.display='none'; appBox.style.display='block';
    usuarioInfo.textContent = `${usuarioLogado.nome} - ${usuarioLogado.perfil}`;
    aplicarPermissoesUsuario(); await carregarDados(); return;
  }
  if(email){ emailLogin.value = email; }
});
</script>
</body>
</html>
